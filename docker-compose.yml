services:

  # ── 1. Azure Function (core extraction engine) ───────────────────────────
  azure-function:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7071:80"   # Host port 7071 → container port 80 (Azure Functions mcr image)
    environment:
      # ── Secrets (loaded from .env — never committed to Git) ───────────────
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      # ── Azure Functions runtime requirements ──────────────────────────────
      AzureWebJobsStorage: ${AZURE_STORAGE_CONNECTION_STRING}
      FUNCTIONS_WORKER_RUNTIME: python
      # ── Storage configuration ─────────────────────────────────────────────
      # DATA_LAKE_PATH inside the container — must match the volume target below.
      DATA_LAKE_PATH: /data/local_data_lake
      BLOB_CONTAINER_NAME: ${BLOB_CONTAINER_NAME:-youtube-comments}
      # ── Extraction tuning ─────────────────────────────────────────────────
      GLOBAL_COMMENT_LIMIT: ${GLOBAL_COMMENT_LIMIT:-10000}
      THEMES_LIST: ${THEMES_LIST:-}
      IS_SHORT: ${IS_SHORT:-true}
      UPLOAD_TO_CLOUD: ${UPLOAD_TO_CLOUD:-false}
      SEARCH_START_DATE: ${SEARCH_START_DATE:-}
      SEARCH_END_DATE: ${SEARCH_END_DATE:-}
    volumes:
      # Bind-mount: HOST_DATA_LAKE_PATH (default: ./local_data_lake) → /data/local_data_lake
      # Files written by the function appear directly in your project folder.
      - ${HOST_DATA_LAKE_PATH:-./local_data_lake}:/data/local_data_lake
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:80/api/extract_youtube_comments"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── 2. Batch Launcher (triggers the function in a loop) ──────────────────
  batch-launcher:
    build:
      context: .
      dockerfile: Dockerfile.launcher
    environment:
      # Port 80 is the internal port the function uses inside Docker's network.
      AZURE_FUNCTION_URL: http://azure-function:80/api/extract_youtube_comments
      # ── Launcher tuning (override in .env if needed) ──────────────────────
      TOTAL_REQUESTS: ${TOTAL_REQUESTS:-2}
      WAIT_TIME_SECONDS: ${WAIT_TIME_SECONDS:-4}
      # ── Pass API key so settings validation passes in the launcher too ─────
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      DATA_LAKE_PATH: /data/local_data_lake
      THEMES_LIST: ${THEMES_LIST:-}
      IS_SHORT: ${IS_SHORT:-true}
      UPLOAD_TO_CLOUD: ${UPLOAD_TO_CLOUD:-false}
      SEARCH_START_DATE: ${SEARCH_START_DATE:-}
      SEARCH_END_DATE: ${SEARCH_END_DATE:-}
    depends_on:
      azure-function:
        condition: service_healthy

